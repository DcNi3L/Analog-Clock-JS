<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Animated Clock</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <canvas id="bg"></canvas>
    
    <div class="controls">
        <button id="numberBtn" class="control-btn">Roman</button>
        <button id="themeBtn" class="control-btn">Light</button>
    </div>
    
    <div class="info">
        Press <kbd>N</kbd> to cycle numbers • Press <kbd>T</kbd> to toggle theme
    </div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="./index.js"></script>
</body>
</html>
